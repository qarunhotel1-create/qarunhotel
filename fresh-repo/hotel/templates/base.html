<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if title %}{{ title }} - {% endif %}QARUN HOTEL</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap RTL CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ static_version }}">
    
    <!-- Modal Fix CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modal-fix.css') }}?v={{ static_version }}">
    
    <!-- Responsive helpers -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}?v={{ static_version }}">
    
    <!-- Fixed Navbar CSS -->
    <style>
        .navbar.fixed-top {
            z-index: 1030;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.95) !important;
        }
        
        body {
            padding-top: 0;
        }
        
        @media (max-width: 768px) {
            /* نستخدم محدد أكثر تحديداً لتجنب تعارضات */
            .container-fluid.page-container {
                margin-top: 70px !important; /* قيمة مبدئية سيتم استبدالها ديناميكياً */
            }
        }
    </style>

    {% block styles %}{% endblock %}
</head>
<body class="fade-in">
    {% include 'includes/navbar.html' %}

    <div class="container-fluid page-container">
        {% include 'includes/flash_messages.html' %}

        <main class="slide-in">
            {% block content %}{% endblock %}
        </main>
    </div>

    <footer class="footer">
        <div class="container text-center">
            <div class="row">
                <div class="col-md-12">
                    <h5 class="text-white mb-3">
                        <i class="fas fa-hotel me-2"></i>QARUN HOTEL
                    </h5>

                    <!-- معلومات أوقات الحجز -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <div class="d-flex align-items-center justify-content-center text-white-50">
                                <i class="fas fa-sign-in-alt text-success me-2"></i>
                                <span>دخول: 1:00 مساءً</span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="d-flex align-items-center justify-content-center text-white-50">
                                <i class="fas fa-sign-out-alt text-danger me-2"></i>
                                <span>خروج: 12:00 مساءً (اليوم التالي)</span>
                            </div>
                        </div>
                    </div>

                    <p class="mb-0">© {{ now.year }} جميع الحقوق محفوظة</p>
                </div>
            </div>
        </div>
    </footer>
    
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}?v={{ static_version }}"></script>
    
    <!-- Modal Fix JS -->
    <script src="{{ url_for('static', filename='js/modal-fix.js') }}?v={{ static_version }}"></script>
    
    <script>
        // كشف الخمول: تسجيل خروج تلقائي بعد 10 دقائق بدون حركة + تحديث الصفحة
        (function () {
            const IDLE_LIMIT_MS = 10 * 60 * 1000; // 10 دقائق
            const KEEPALIVE_INTERVAL_MS = 120000; // إرسال نبضة بقاء كل دقيقتين عند وجود حركة

            let lastActivity = Date.now();
            let lastPing = 0;
            let idleTriggered = false;

            function markActivity() {
                lastActivity = Date.now();
                idleTriggered = false; // ألغِ حالة الخمول عند أي حركة
            }

            // أحداث تعتبر "حركة" للمستخدم
            ['mousemove', 'keydown', 'click', 'scroll', 'touchstart', 'touchmove'].forEach(ev => {
                window.addEventListener(ev, markActivity, { passive: true });
            });

            // طالما أن هناك حركة خلال الحد المسموح، أرسل نبضات خفيفة لإبقاء الجلسة حية على الخادم
            function keepAliveIfNeeded() {
                const now = Date.now();
                if (now - lastActivity < IDLE_LIMIT_MS && now - lastPing > KEEPALIVE_INTERVAL_MS) {
                    lastPing = now;
                    fetch('/api/test?t=' + now, { credentials: 'include', cache: 'no-store' })
                        .catch(() => { /* تجاهل الأخطاء */ });
                }
            }

            // إن تجاوز الخمول 10 دقائق: نفّذ تسجيل خروج على الخادم ثم حدّث الصفحة
            function enforceIdleLogout() {
                const now = Date.now();
                if (!idleTriggered && now - lastActivity >= IDLE_LIMIT_MS) {
                    idleTriggered = true;
                    fetch('/auth/logout', { credentials: 'include', cache: 'no-store' })
                        .finally(() => { window.location.reload(); });
                }
            }

            // فحص دوري للخمول وإرسال النبضات
            setInterval(() => {
                keepAliveIfNeeded();
                enforceIdleLogout();
            }, 30000); // كل 30 ثانية
        })();
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
