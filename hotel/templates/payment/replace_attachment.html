{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">
        <h5 class="mb-0"><i class="fas fa-paperclip me-2"></i>استبدال/رفع مرفق الدفعة #{{ payment.id }}</h5>
      </div>
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label">الملف الحالي</label>
            <div>
              {% if payment.attachment_file %}
                <code>{{ payment.attachment_file }}</code>
              {% else %}
                <span class="text-muted">لا يوجد</span>
              {% endif %}
            </div>
          </div>
          <div class="mb-3">
            <label for="attachment" class="form-label">اختر ملفًا جديدًا</label>
            <input type="file" class="form-control" id="attachment" name="attachment" accept="image/*,application/pdf">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>حفظ</button>
            <a href="{{ url_for('booking.details', id=payment.booking_id) }}" class="btn btn-secondary">عودة</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
